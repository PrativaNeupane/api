<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://fonts.googleapis.com/css2?family=GeistSans:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <div class="container--fluid">
      <div class="spin">
        <div id="loader"></div>
      </div>
      <div id="product_container"></div>

    <footer>
      <hr class="footer-divider" />
      <div class="footer-container">
        <div class="footer-column-left">
          <div class="footer_image">
            <img src="./public/asstes/projectlogo.jpg" alt="Logo" />
            <h3>ACME STORE</h3>

          <div class="footer-column">
            <a href="#" class="footer-link"> Home</a>

            <a href="#">Shipping & return policy</a>
            <a href="#">FAQ</a>

          </div>
          <div class="footer-column-right">
            <div class="triangle-button">
              <button>
                <i class="fa-solid fa-play"></i>

              <div class="vertical-line">
                <h3>Deploy</h3>
              </div>
            </div>
        </div>
      </div>
      <hr class="footer-bottom-divider" />
      <div class="footer-bottom">
        <div class="footer-info">
          <p>© 2023 - 2025 ACME, Inc. All rights reserved.</p>
          <div class="view-source">
            <p>View the source</p>

        </div>
        
        <button class="triangle-button-bottom">
